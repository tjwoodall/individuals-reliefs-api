                    type: object
                    properties:
                      uniqueInvestmentRef:
                        description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                        type: string
                        pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        example: '12345678'
                      companyName:
                        description: The name of the company holding the investment. Must not be empty or contain only whitespace.
                        type: string
                        pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                        example: Company Inc
                      dateOfInvestment:
                        description: The date of the investment. Date in the format YYYY-MM-DD
                        type: string
