                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: The matching resource was not found.
                  value: &ref_16
                    code: MATCHING_RESOURCE_NOT_FOUND
