openapi: 3.0.3
info:
  version: '2.0'
  title: Individuals Reliefs (MTD)
  description: |
    The following groups of endpoints are stateful in the Sandbox:
    * [Relief Investments](#tag/Relief-Investments)
    * [Other Reliefs](#tag/Other-Reliefs)
    * [Foreign Reliefs](#tag/Foreign-Reliefs)
    * [Pensions Reliefs](#tag/Pensions-Reliefs)
    * [Charitable Givings](#tag/Charitable-Givings)

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 
    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/2.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Relief Investments
    description: Resources relating to an individual's relief investments
  - name: Other Reliefs
    description: Resources relating to an individual's other reliefs
  - name: Foreign Reliefs
    description: Resources relating to an individual's foreign reliefs
  - name: Pensions Reliefs
    description: Resources relating to an individual's pensions reliefs
  - name: Charitable Givings
    description: Resources relating to an individual's charitable givings
paths:
  /individuals/reliefs/investment/{nino}/{taxYear}:
    get:
      summary: Retrieve Relief Investments
      security:
        - User-Restricted:
            - read:self-assessment
      description: |
        This endpoint enables you to retrieve relief investments from: 
        VCT subscriptions, EIS subscriptions, Community Investments, Seed Enterprise Investments 
        and Social Enterprise Investments. 
        A National Insurance number and tax year must be provided.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                       |
        |----------------------------------|------------------------------------------------|
        | N/A - DEFAULT                    | Simulates a success response.                  |
        | NOT_FOUND                        | Simulates the scenario where no data is found. |
        | STATEFUL                         | Performs a stateful retrieve.                  |
      tags:
        - Relief Investments
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_3
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years. The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid. (The minimum tax year in Sandbox is 2021-22.)
          schema: &ref_4
            type: string
            pattern: ^\d{4}-\d{2}$
            example: 2022-23
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_5
            type: string
            enum:
              - application/vnd.hmrc.2.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_17
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_6
            type: string
            example: '-'
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Retrieve Relief Investments
                description: Allows the retrieval of relief investments
                type: object
                properties:
                  submittedOn:
                    description: The date the investment relief was added. It must be provided in the format YYYY-MM-DDThh:mm:ss.SSSZ
                    type: string
                    example: '2019-04-04T01:01:01.000Z'
                  vctSubscription:
                    description: Financial details about VCT subscriptions income
                    type: array
                    items:
                      type: object
                      properties:
                        uniqueInvestmentRef:
                          description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                          example: '12345678'
                        name:
                          description: The name of the investment or fund. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                          example: VCT fund
                        dateOfInvestment:
                          description: |-
                            The date of the investment.

                            Date in the format YYYY-MM-DD
                          type: string
                          example: '2018-04-06'
                        amountInvested:
                          description: |-
                            The total amount invested.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        reliefClaimed:
                          description: |-
                            The amount on which relief is claimed for the tax year.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                      required:
                        - uniqueInvestmentRef
                        - reliefClaimed
                      additionalProperties: false
                  eisSubscription:
                    description: Financial details about EIS subscriptions income.
                    type: array
                    items:
                      type: object
                      properties:
                        uniqueInvestmentRef:
                          description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                          example: '12345678'
                        name:
                          description: The name of the investment or fund. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                          example: EIS fund
                        knowledgeIntensive:
                          description: Companies that are carrying out research, development or innovation.
                          type: boolean
                          example: 'true'
                        dateOfInvestment:
                          description: |-
                            The date of the investment.

                            Date in the format YYYY-MM-DD
                          type: string
                          example: '2018-04-06'
                        amountInvested:
                          description: |-
                            The total amount invested.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        reliefClaimed:
                          description: |-
                            The amount on which relief is claimed for the tax year.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                      required:
                        - uniqueInvestmentRef
                        - reliefClaimed
                      additionalProperties: false
                  communityInvestment:
                    description: Financial details about community investment income.
                    type: array
                    items:
                      type: object
                      properties:
                        uniqueInvestmentRef:
                          description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                          example: '12345678'
                        name:
                          description: The name of the investment or fund. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                          example: CI X
                        dateOfInvestment:
                          description: |-
                            The date of the investment.

                            Date in the format YYYY-MM-DD
                          type: string
                          example: '2018-04-06'
                        amountInvested:
                          description: |-
                            The total amount invested.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        reliefClaimed:
                          description: |-
                            The amount of relief being claimed for the year.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                      required:
                        - uniqueInvestmentRef
                        - reliefClaimed
                      additionalProperties: false
                  seedEnterpriseInvestment:
                    description: Financial details about Seed Investment Income.
                    type: array
                    items:
                      type: object
                      properties:
                        uniqueInvestmentRef:
                          description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                          example: '12345678'
                        companyName:
                          description: The name of the company holding the investment. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                          example: Company Inc
                        dateOfInvestment:
                          description: |-
                            The date of the investment.

                            Date in the format YYYY-MM-DD
                          type: string
                          example: '2018-04-06'
                        amountInvested:
                          description: |-
                            The total amount invested.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        reliefClaimed:
                          description: |-
                            The amount on which relief is claimed for the tax year.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                      required:
                        - uniqueInvestmentRef
                        - reliefClaimed
                      additionalProperties: false
                  socialEnterpriseInvestment:
                    description: Financial details about social enterprise investment income.
                    type: array
                    items:
                      type: object
                      properties:
                        uniqueInvestmentRef:
                          description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                          example: '12345678'
                        socialEnterpriseName:
                          description: The name of the investment or fund. Must not be empty or contain only whitespace.
                          type: string
                          pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                          example: SE Inc
                        dateOfInvestment:
                          description: |-
                            The date of the investment.

                            Date in the format YYYY-MM-DD
                          type: string
                          example: '2018-04-06'
                        amountInvested:
                          description: |-
                            The total amount invested.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        reliefClaimed:
                          description: |-
                            The amount on which relief is claimed for the tax year.

                            The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          type: number
                          example: '2000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                      required:
                        - uniqueInvestmentRef
                        - reliefClaimed
                      additionalProperties: false
                required:
                  - submittedOn
                additionalProperties: false
              examples:
                example-response:
                  description: Example response
                  value:
                    $ref: ./examples/retrieve_relief_investments_response.json
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: &ref_1
                  code:
                    description: The error code
                    type: string
                  message:
                    description: The error message
                    type: string
                required: &ref_2
                  - code
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: &ref_7
                    code: FORMAT_NINO
                    message: The provided NINO is invalid
                FORMAT_TAX_YEAR:
                  description: The format of the supplied taxYear field is not valid.
                  value: &ref_8
                    code: FORMAT_TAX_YEAR
                    message: The provided tax year is invalid
                RULE_TAX_YEAR_FOR_VERSION_NOT_SUPPORTED:
                  description: This version of the API supports tax years up to, and including, 2024-25. For tax years from 2025-26 onwards, use version 3.
                  value: &ref_10
                    code: RULE_TAX_YEAR_FOR_VERSION_NOT_SUPPORTED
                    message: This version of the API supports tax years up to, and including, 2024-25. For tax years from 2025-26 onwards, use version 3.
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: |
                    The specified tax year is not supported.
                    Either the tax year specified is before the minimum tax year value,
                    or it is after the maximum tax year value.
                  value: &ref_9
                    code: RULE_TAX_YEAR_NOT_SUPPORTED
                    message: The tax year specified does not lie within the supported range
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required.
                  value: &ref_11
                    code: RULE_TAX_YEAR_RANGE_INVALID
                    message: Tax year range invalid. A tax year range of one year is required
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: |
                    The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: &ref_12
                    code: RULE_INCORRECT_GOV_TEST_SCENARIO
                    message: The supplied Gov-Test-Scenario is not valid
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client and/or agent is not authorised. This is normally because:
                    the client is not subscribed to MTD, the agent is not subscribed to Agent Services,
                    or the client has not authorised the agent to act on their behalf.
                  value: &ref_13
                    code: CLIENT_OR_AGENT_NOT_AUTHORISED
                    message: The client and/or agent is not authorised
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
