    put:
      summary: Create and Amend Relief Investments
      security:
        - User-Restricted:
            - write:self-assessment
      description: |
        This endpoint enables you to create and amend relief investments from: VCT subscriptions, EIS subscriptions, 
        Community Investments, Seed Enterprise Investments and Social Enterprise Investments. A National Insurance number and 
        tax year must be provided.

        > <span style="color:red"> **Warning:**
        > Social Enterprise Investments must not be created for tax years 2023-24 onwards.</span>

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                        |
        |----------------------------------|-------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates a success response.                                                                   |
        | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window. |
        | STATEFUL                         | Performs a stateful create or update.                                                           |
      tags:
        - Relief Investments
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year to which the data applies. For example: 2022-23. The start year and end year must not span two tax years. The minimum tax year is 2022-23. No gaps are allowed, for example, 2022-24 is not valid. (The minimum tax year in Sandbox is 2021-22.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: &ref_18
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_14
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Amend Relief Investments
              description: Allows the amendments of relief investments
              type: object
              properties:
                vctSubscription:
                  description: Financial details about VCT subscriptions income
                  type: array
                  items:
                    type: object
                    properties:
                      uniqueInvestmentRef:
                        description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                        type: string
                        pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        example: '12345678'
                      name:
                        description: The name of the investment or fund. Must not be empty or contain only whitespace.
                        type: string
                        pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                        example: VCT fund
                      dateOfInvestment:
                        description: The date of the investment. Date in the format YYYY-MM-DD
                        type: string
                        example: '2018-04-06'
                      amountInvested:
                        description: The total amount invested. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        type: number
                        example: '2000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      reliefClaimed:
                        description: The amount on which relief is claimed for the tax year. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        type: number
                        example: '2000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                    required:
                      - uniqueInvestmentRef
                      - reliefClaimed
                    additionalProperties: false
                eisSubscription:
                  description: Financial details about EIS subscriptions income.
                  type: array
                  items:
                    type: object
                    properties:
                      uniqueInvestmentRef:
                        description: The Unique Investment Reference (UIR) or the name of the authorising tax office as shown on the certificate. Must not be empty or contain only whitespace.
                        type: string
                        pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        example: '12345678'
                      name:
                        description: The name of the investment or fund. Must not be empty or contain only whitespace.
                        type: string
                        pattern: ^[0-9a-zA-Z{À-˿'}\- _&`():.'^]{1,105}$
                        example: EIS fund
                      knowledgeIntensive:
                        description: A boolean indicating whether companies are carrying out research, development or innovation.
                        type: boolean
                        example: 'true'
                      dateOfInvestment:
                        description: The date of the investment. Date in the format YYYY-MM-DD
                        type: string
